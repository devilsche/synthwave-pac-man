<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTHWAVE PAC-MAN</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0015;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #gameWrapper {
    position: relative;
    display: inline-block;
  }
  #gameCanvas {
    display: block;
    border: 2px solid #ff2d78;
    box-shadow: 0 0 30px #ff2d78, 0 0 60px #c77dff44, inset 0 0 30px #00000088;
    image-rendering: pixelated;
  }
  /* Scanline overlay */
  #gameWrapper::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 10;
  }
  #hud {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    color: #ff2d78;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 8px #ff2d78;
  }
  #hudScore, #hudHigh, #hudLevel, #hudLives { min-width: 100px; }
  #hudHigh { text-align: center; }
  #hudLevel { text-align: center; }
  #hudLives { text-align: right; }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ffe000;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 4px;
    text-shadow: 0 0 16px #ffe000, 0 0 32px #ff8c00;
    text-align: center;
    pointer-events: none;
    z-index: 20;
    display: none;
  }
</style>
</head>
<body>
  <div id="hud">
    <div id="hudScore">SCORE: <span id="scoreVal">0</span></div>
    <div id="hudHigh">BEST: <span id="highVal">0</span></div>
    <div id="hudLevel" style="color:#00f5ff;text-shadow:0 0 8px #00f5ff;font-size:14px;letter-spacing:2px;text-transform:uppercase;">LEVEL: <span id="levelVal">1</span></div>
    <div id="hudLives">LIVES: <span id="livesVal">❤❤❤</span></div>
  </div>
  <div id="gameWrapper">
    <canvas id="gameCanvas"></canvas>
    <div id="message"></div>
  </div>
  <script src="js/bundle.js"></script>
</body>
</html>
